    background-color: #45a049;

    <div id="power-ups">
        <h2>power ups</h2>
        <button id="auto-clicker">auto clicker (cost: 10 clicks)</button>
        <button id="multiplier">multiplier (cost: 50 clicks)</button>
        <button id="super-clicker">super clicker (cost: 100 clicks)</button>
    </div>
    <script>
let clicks = 0;
let autoClickers = 0;
let multiplier = 1;
let superClicker = 0;

const clickCountElement = document.getElementById('click-count');
const clickImage = document.getElementById('click-image');
const autoClickerButton = document.getElementById('auto-clicker');
const multiplierButton = document.getElementById('multiplier');
const superClickerButton = document.getElementById('super-clicker');

function updateDisplay() {
    clickCountElement.textContent = `clicks: ${clicks}`;
    autoClickerButton.textContent = `auto clicker (cost: 10 clicks) - owned: ${autoClickers}`;
    multiplierButton.textContent = `multiplier (cost: 50 clicks) - level: ${multiplier}`;
    superClickerButton.textContent = `super clicker (cost: 100 clicks) - owned: ${superClicker}`;
    
    autoClickerButton.disabled = clicks < 10;
    multiplierButton.disabled = clicks < 50;
    superClickerButton.disabled = clicks < 100;
}

clickImage.addEventListener('click', () => {
    clicks += multiplier;
    updateDisplay();
});

autoClickerButton.addEventListener('click', () => {
    if (clicks >= 10) {
        clicks -= 10;
        autoClickers++;
        updateDisplay();
    }
});

multiplierButton.addEventListener('click', () => {
    if (clicks >= 50) {
        clicks -= 50;
        multiplier++;
        updateDisplay();
    }
});

superClickerButton.addEventListener('click', () => {
    if (clicks >= 100) {
        clicks -= 100;
        autoClickers += 5; // super Clicker gives 5 auto clickers
        superClicker++;
        updateDisplay();
    }
});

// auto clicker interval
setInterval(() => {
    if (autoClickers > 0) {
        clicks += autoClickers * multiplier;
        updateDisplay();
    }
}, 1000); // Every second

updateDisplay();
    </script>
